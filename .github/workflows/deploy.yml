name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main # ou master, dependendo do nome da sua branch principal

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: ⚙️ Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: 📦 Install dependencies
      run: npm install

    - name: 🚀 Build Project
      run: npm run build

    - name: 📂 Sync files to Hostinger
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        # A pasta dist contém os arquivos compilados do React
        server-dir: ./public_html_site/
        # Substitua public_html/ pelo caminho correto se precisar, ex: public_html/seu-site.com/
